[pytest]
# This machine has a global ROS2 (Humble) Python install whose pytest
# plugins (launch_ros, launch_testing) register themselves as setuptools
# entry points and get auto-discovered even inside this project's venv —
# launch_testing then fails to import (missing "lark" dependency, a ROS
# package, unrelated to this project) and crashes pytest's startup
# entirely. Disabling just those two plugins by name (not all autoloading)
# keeps pytest-asyncio's own entry-point autoload working normally.
addopts = -p no:launch_ros -p no:launch_testing
asyncio_mode = auto
